<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} — Gas Town</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="min-h-screen bg-base-200">
  <div class="drawer lg:drawer-open">
    <input id="nav-drawer" type="checkbox" class="drawer-toggle">
    <div class="drawer-content flex flex-col">
      <!-- Top bar -->
      <div class="navbar bg-base-100 shadow-sm lg:hidden">
        <label for="nav-drawer" class="btn btn-square btn-ghost">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </label>
        <span class="text-xl font-bold ml-2">⛽ Gas Town</span>
      </div>
      <!-- Main content -->
      <main class="flex-1 p-6">
        {{content}}
      </main>
    </div>
    <!-- Sidebar -->
    <div class="drawer-side">
      <label for="nav-drawer" class="drawer-overlay"></label>
      <aside class="bg-base-100 w-64 min-h-screen flex flex-col">
        <div class="p-4 text-xl font-bold border-b border-base-300">⛽ Gas Town</div>
        <ul class="menu p-4 flex-1">
          <li class="menu-title">Navigation</li>
          <li><a href="/">Overview</a></li>
          <li><a href="/pipeline">Pipeline</a></li>
          <li><a href="/agents">Agents</a></li>
          <li><a href="/mayor">Mayor</a></li>
          <li><a href="/tour">Tour</a></li>
          <li class="menu-title mt-4">Rigs</li>
            {{navItems}}
        </ul>
      </aside>
    </div>
  </div>
</body>
</html>
